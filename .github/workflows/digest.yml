name: Daily Claude Code Digest

on:
  schedule:
    # 10:00 UTC = 6 AM EDT / 5 AM EST
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: npx tsx src/index.ts

      - name: Commit and push
        run: |
          git config user.name "Daily Digest Bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add Daily/ data/
          [ -d Weekly ] && git add Weekly/ || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)

          # Pull latest before committing to minimize conflicts
          git stash
          git pull --no-rebase origin main --no-edit
          git stash pop || true

          # Re-stage in case pull changed things
          git add Daily/ data/
          [ -d Weekly ] && git add Weekly/ || true

          if git diff --staged --quiet; then
            echo "No changes to commit after pull"
            exit 0
          fi

          git commit -m "Daily digest: ${DATE}"
          git push origin main
